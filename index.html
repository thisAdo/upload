<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adz Up</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="17 8 12 3 7 8"/>
                        <line x1="12" y1="3" x2="12" y2="15"/>
                    </svg>
                    <span class="logo-text">Adz Up</span>
                </div>
            </div>

            <nav class="sidebar-nav">
                <a href="#" class="nav-item active">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
                    <span>Archivos</span>
                </a>
                <a href="#" class="nav-item">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                    <span>Historial</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="status-badge">
                    <span class="status-dot"></span>
                    <span>Seguro y Local</span>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="main-header">
                <div class="header-left">
                    <button class="icon-btn mobile-menu-btn" id="menuToggle">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
                    </button>
                    <h1>Subir a GitHub</h1>
                </div>
                <div class="header-right">
                    <button class="icon-btn" id="themeToggle" title="Cambiar tema">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
                    </button>
                </div>
            </header>

            <div class="content-area">
                <section class="card">
                    <div class="drop-zone" id="dropZone">
                        <div class="drop-zone-content">
                            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                                <polyline points="17 8 12 3 7 8"/>
                                <line x1="12" y1="3" x2="12" y2="15"/>
                            </svg>
                            <div class="drop-text">
                                <h2>Arrastra tu archivo ZIP aquí</h2>
                                <p>o haz clic para seleccionar</p>
                            </div>
                            <input type="file" id="fileInput" accept=".zip" hidden>
                        </div>
                    </div>

                    <div class="file-preview" id="filePreview" style="display: none;">
                        <div class="file-card">
                            <div class="file-icon-mini">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                            </div>
                            <div class="file-details">
                                <span class="file-name" id="fileName">archivo.zip</span>
                                <span class="file-size" id="fileSize">2.5 MB</span>
                            </div>
                            <button class="icon-btn-sm" id="removeFile" title="Eliminar">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                            </button>
                        </div>
                    </div>
                </section>

                <section class="card files-card" id="filesCard" style="display: none;">
                    <div class="card-header">
                        <h3>Archivos extraídos</h3>
                        <span class="badge" id="fileCount">0</span>
                    </div>
                    <div class="files-list" id="filesList"></div>
                </section>

                <section class="card settings-card">
                    <div class="card-header">
                        <h3>Configuración</h3>
                    </div>
                    <div class="card-content">
                        <div class="form-group">
                            <label for="githubToken">Token de acceso</label>
                            <div class="input-group">
                                <input type="password" id="githubToken" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" autocomplete="off">
                                <button class="icon-btn-sm" id="toggleToken">
                                    <svg class="icon-eye" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                                    <svg class="icon-eye-off" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                                </button>
                            </div>
                            <span class="form-hint">Scope requerido: <code>repo</code></span>
                        </div>

                        <div class="form-group">
                            <label for="repoPath">Repositorio</label>
                            <input type="text" id="repoPath" class="input-full" placeholder="usuario/nombre-repositorio">
                            <span class="form-hint">Formato: propietario/repositorio</span>
                        </div>

                        <div class="form-group">
                            <label for="commitMessage">Mensaje del commit</label>
                            <input type="text" id="commitMessage" class="input-full" placeholder="feat: agregar archivos del proyecto">
                        </div>

                        <button class="btn btn-primary" id="uploadBtn" disabled>
                            <span>Subir a GitHub</span>
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
                        </button>
                    </div>
                </section>

                <section class="card progress-card" id="progressCard" style="display: none;">
                    <div class="card-content">
                        <div class="progress-header">
                            <span class="progress-title">Subiendo archivos...</span>
                            <span class="progress-count" id="progressCount">0 / 0</span>
                        </div>
                        <div class="progress-bar-container">
                            <div class="progress-bar" id="progressBar"></div>
                        </div>
                        <p class="progress-status" id="progressStatus">Preparando...</p>
                    </div>
                </section>

                <section class="card result-card" id="resultCard" style="display: none;">
                    <div class="result-content" id="resultContent"></div>
                </section>
            </div>
        </main>
    </div>

    <div class="loading-overlay" id="loadingOverlay" style="display: none;">
        <div class="loading-spinner"></div>
        <span>Descomprimiendo Zip...</span>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
